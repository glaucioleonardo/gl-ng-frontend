<!--suppress HtmlFormInputWithoutLabel -->
<input
  #inputElement
  class="item-content {{ itemContentAlignment }} {{ class }}"
  type="text"
  [id]="id"
  [value]="value"
  [autocomplete]="'off'"
  required
  [placeholder]="placeholder"
  (keyup)="onKeyUp($event)"
  [disabled]="disabled"
  [maxLength]="maxLength">
